# ----------------------------------------
# Supabase PostgreSQL Database Connection
# ----------------------------------------

# IMPORTANT: You need to go to your Supabase Dashboard -> Database -> Database Settings
# Find your "Connection String" (URI) and replace the URL below.
# Make sure to replace [YOUR-PASSWORD] with your actual database password!

spring.datasource.url=jdbc:postgresql://db.jltxddqamdxrupwjkedw.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=Pradeep@2006@
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
# Note: Since the tables are already created in Supabase, we set ddl-auto to none or validate.
# Setting to 'none' is safest so Spring Boot doesn't try to drop your existing tables!
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Web Server Port
server.port=8080
